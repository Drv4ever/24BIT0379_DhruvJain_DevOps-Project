apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-tech-deployment
  labels:
    app: abc-tech-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-tech-web
  template:
    metadata:
      labels:
        app: abc-tech-web
    spec:
      containers:
      - name: abc-tech-website
        image: drv4ever/abc-tech-website:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: abc-tech-service
  labels:
    app: abc-tech-web
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
  selector:
    app: abc-tech-web
