define host {
    use                     linux-server
    host_name               kubernetes-host
    alias                   Kubernetes Website Server
    address                 host.docker.internal
    max_check_attempts      3
    check_period            24x7
    contact_groups          admins
    check_command           check_http_port!30080
}

define service {
    use                     generic-service
    host_name               kubernetes-host
    service_description     HTTP - Website Health
    check_command           check_http_port!30080
    max_check_attempts      3
    check_period            24x7
    contact_groups          admins
}
