define host {
    use                     linux-server
    host_name               kubernetes-host
    alias                   Kubernetes Website Server
    address                 127.0.0.1
    max_check_attempts      3
    check_period            24x7
    contact_groups          admins
}

define service {
    use                     generic-service
    host_name               kubernetes-host
    service_description     HTTP - Website Health
    check_command           check_http!-p 80 -e 401
    max_check_attempts      3
    check_period            24x7
    contact_groups          admins
}
